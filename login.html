<!DOCTYPE html>
<html>
<head>
    <title>Frag Map - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">

    <h1>🚀 Frag Map</h1>
    <p class="subtitle">Orbital Density Visualizer</p>

    <div class="login-box">

        <div class="tab-buttons">
            <button onclick="showTab('login')" 
                id="loginTab" class="tab-active">Login</button>
            <button onclick="showTab('signup')" 
                id="signupTab">Sign Up</button>
        </div>

        <div id="loginForm">
            <input type="text" id="loginUser" 
                placeholder="Username"><br>
            <input type="password" id="loginPass" 
                placeholder="Password"><br>
            <button onclick="login()" class="main-btn">Login</button>
            <p id="loginMsg"></p>
        </div>

        <div id="signupForm" style="display:none;">
            <input type="text" id="signupUser" 
                placeholder="Username"><br>
            <input type="email" id="signupEmail" 
                placeholder="Email"><br>
            <input type="password" id="signupPass" 
                placeholder="Password"><br>
            <select id="signupType">
                <option value="">Select User Type</option>
                <option value="student">Student</option>
                <option value="researcher">Researcher</option>
                <option value="engineer">Engineer</option>
                <option value="public">Public</option>
            </select><br>
            <button onclick="signup()" 
                class="main-btn">Create Account</button>
            <p id="signupMsg"></p>
        </div>

    </div>
</div>

<script src="login.js"></script>

</body>
</html>
